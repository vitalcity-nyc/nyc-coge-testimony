<!-- COGE testimony catalog — Ghost HTML card.
     Paste this whole block into a Ghost HTML card; nothing else is required.
     The iframe auto-sizes to its content (no inner scrollbar, no scroll hijack):
     collapsed, the wrapper clips it to CAP px; "Expand" releases the clip.
     Source: https://github.com/vitalcity-nyc/nyc-coge-testimony -->
<div class="vc-coge" style="margin:2em 0;">

  <div class="vc-coge__clip" style="position:relative;width:100%;max-height:1500px;overflow:hidden;border:1px solid #050507;background:#fff;">
    <iframe
      class="vc-coge__iframe"
      src="https://vitalcity-nyc.github.io/nyc-coge-testimony/?embed=1"
      title="Testimony to the Commission on Government Efficiency, by idea"
      loading="lazy"
      scrolling="no"
      allow="fullscreen"
      style="display:block;width:100%;height:1500px;border:0;background:#fff;"
    ></iframe>
    <div class="vc-coge__fade" style="position:absolute;left:0;right:0;bottom:0;height:110px;pointer-events:none;background:linear-gradient(to bottom,rgba(255,255,255,0),#fff 85%);"></div>
  </div>

  <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin:12px 0 0;">
    <button class="vc-coge__expand" type="button"
      style="font:700 12px/1 'halyard-text',Inter,Helvetica,Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#050507;background:#dde44c;border:1px solid #050507;padding:11px 18px;cursor:pointer;">
      Expand the full catalog
    </button>
    <a href="https://vitalcity-nyc.github.io/nyc-coge-testimony/" target="_blank" rel="noopener"
      style="font:700 12px/1 'halyard-text',Inter,Helvetica,Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#ff7c53;text-decoration:none;border-bottom:1px solid #ff7c53;padding-bottom:2px;">
      Open full screen &#8599;
    </a>
  </div>

  <p style="font:300 13px/1.5 'halyard-text',Inter,Helvetica,Arial,sans-serif;color:#707175;margin:10px 0 0;">
    Search by idea, person or organization, or tap a theme to open it. Ideas that made the November ballot are boxed.
  </p>

  <script>
  (function(){
    var roots = document.querySelectorAll('.vc-coge');
    var root  = roots[roots.length - 1];
    var clip  = root.querySelector('.vc-coge__clip');
    var frame = root.querySelector('.vc-coge__iframe');
    var fade  = root.querySelector('.vc-coge__fade');
    var btn   = root.querySelector('.vc-coge__expand');
    var CAP = 1500;
    var expanded = false, last = CAP;

    function apply(){
      frame.style.height = last + 'px';
      clip.style.maxHeight = expanded ? 'none' : CAP + 'px';
      fade.style.display = (!expanded && last > CAP) ? 'block' : 'none';
      btn.style.display  = (expanded || last > CAP) ? 'inline-block' : 'none';
    }

    window.addEventListener('message', function(e){
      var d = e && e.data;
      if(!d || d.type !== 'vc-embed-height' || d.id !== 'nyc-coge-testimony') return;
      if(typeof d.height !== 'number' || d.height < 200) return;
      last = d.height;
      apply();
    });

    btn.addEventListener('click', function(){
      expanded = !expanded;
      btn.textContent = expanded ? 'Collapse the catalog' : 'Expand the full catalog';
      apply();
      if(!expanded) clip.scrollIntoView({behavior:'smooth', block:'start'});
    });

    apply();
  })();
  </script>
</div>
