<!-- COGE testimony catalog — Ghost HTML card.
     Paste this whole block into a Ghost HTML card; nothing else is required.

     Layout note: every control lives INSIDE the bordered frame, and the only
     thing in the host article's flow is one block-level <div> and one <p>.
     An earlier version put the button and the full-screen link in a
     display:flex row below the frame; in Ghost the article's next paragraph
     ended up beside the button. Nothing here is flex or floated, so stray
     neighboring content can only stack above or below — never alongside.

     Source: https://github.com/vitalcity-nyc/nyc-coge-testimony -->
<div class="vc-coge" style="display:block;clear:both;width:100%;margin:2em 0;overflow:hidden;">

  <div class="vc-coge__clip" style="display:block;position:relative;width:100%;max-height:2400px;overflow:hidden;border:1px solid #050507;background:#fff;">

    <iframe
      class="vc-coge__iframe"
      src="https://vitalcity-nyc.github.io/nyc-coge-testimony/?embed=1"
      title="Testimony to the Commission on Government Efficiency, by idea"
      loading="lazy"
      scrolling="no"
      allow="fullscreen"
      style="display:block;width:100%;height:2400px;border:0;background:#fff;"
    ></iframe>

    <div class="vc-coge__fade" style="display:block;position:absolute;left:0;right:0;bottom:0;height:190px;pointer-events:none;background:linear-gradient(to bottom,rgba(255,255,255,0),#ffffff 70%);"></div>

    <div class="vc-coge__bar" style="display:block;position:absolute;left:0;right:0;bottom:0;text-align:center;padding:0 0 26px;background:transparent;">
      <button class="vc-coge__expand" type="button"
        style="font:700 12px/1 'halyard-text',Inter,Helvetica,Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase;color:#050507;background:#dde44c;border:1px solid #050507;padding:12px 20px;cursor:pointer;">
        Expand the full catalog
      </button>
    </div>

  </div>

  <p class="vc-coge__cap" style="display:block;clear:both;font:300 13px/1.6 'halyard-text',Inter,Helvetica,Arial,sans-serif;color:#707175;margin:12px 0 0;">
    Search by idea, person or organization, or tap a theme to open it. Ideas that made the November ballot are boxed.
    <a href="https://vitalcity-nyc.github.io/nyc-coge-testimony/" target="_blank" rel="noopener" style="color:#ff7c53;">Open the catalog full screen &#8599;</a>
  </p>

</div>
<script>
(function(){
  var roots = document.querySelectorAll('.vc-coge');
  var root  = roots[roots.length - 1];
  if(!root || root.getAttribute('data-wired')) return;
  root.setAttribute('data-wired','1');

  var clip  = root.querySelector('.vc-coge__clip');
  var frame = root.querySelector('.vc-coge__iframe');
  var fade  = root.querySelector('.vc-coge__fade');
  var bar   = root.querySelector('.vc-coge__bar');
  var btn   = root.querySelector('.vc-coge__expand');
  var CAP = 2400;
  var expanded = false, last = CAP;

  function apply(){
    frame.style.height   = last + 'px';
    clip.style.maxHeight = expanded ? 'none' : CAP + 'px';
    var tall = last > CAP;
    fade.style.display = (!expanded && tall) ? 'block' : 'none';
    if(expanded){
      // sit below the content, still inside the frame, so it can never
      // land next to the host article's text
      bar.style.position   = 'static';
      bar.style.padding    = '20px 0 26px';
      bar.style.background = '#ffffff';
      bar.style.display    = 'block';
    } else {
      bar.style.position   = 'absolute';
      bar.style.padding    = '0 0 26px';
      bar.style.background = 'transparent';
      bar.style.display    = tall ? 'block' : 'none';
    }
  }

  window.addEventListener('message', function(e){
    var d = e && e.data;
    if(!d || d.type !== 'vc-embed-height' || d.id !== 'nyc-coge-testimony') return;
    if(typeof d.height !== 'number' || d.height < 200) return;
    last = d.height;
    apply();
  });

  btn.addEventListener('click', function(){
    expanded = !expanded;
    btn.textContent = expanded ? 'Collapse the catalog' : 'Expand the full catalog';
    apply();
    if(!expanded) clip.scrollIntoView({behavior:'smooth', block:'start'});
  });

  apply();
})();
</script>
